name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build, test, pack, verify
        run: ./build/build.sh

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
          PACKAGE_FILE: build/IntelliJIdeaActionRing_1_1.lplug4
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "$PACKAGE_FILE" --clobber
          else
            gh release create "$TAG_NAME" "$PACKAGE_FILE" --title "$TAG_NAME" --generate-notes
          fi
